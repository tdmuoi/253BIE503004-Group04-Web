<!-- ── TOP BAR ── -->
<div class="topbar">FREESHIP TOÀN QUỐC ĐƠN HÀNG TRÊN 2.000.000 VNĐ!</div>

<!-- ── HEADER ── -->
<header class="header">
  <a class="logo" routerLink="/homepage" aria-label="Lightbooks">
    <img src="assets/img/logo.png" alt="Lightbooks" />
  </a>

  <button class="cat-btn" aria-label="Danh mục">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
  </button>

  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm sách bạn yêu thích..." />
  </div>

  <div class="header-icons">
    <button class="ic-btn" routerLink="/cart" aria-label="Giỏ hàng">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </button>
    <button class="ic-btn" routerLink="/PersonalAccount/personal-information" aria-label="Tài khoản">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.5 19a6 6 0 0 1 11 0"/></svg>
    </button>
    <button class="ic-btn" aria-label="Thông báo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
  </div>
</header>

<!-- ── NAV ── -->
<nav class="nav">
  @for (item of navItems; track item.label) {
    <a class="nav-link"
       [routerLink]="item.link"
       routerLinkActive="active">{{ item.label }}</a>
  }
</nav>
