<footer class="footer">
  <div class="footer-inner">
    <div class="footer-grid">
      <!-- Brand -->
      <div class="footer-brand">
        <img class="footer-logo" src="assets/img/logo.png" alt="Lightbooks" />
        <p class="footer-tagline">Nơi tri thức được tỏa sáng qua từng trang sách.<br/>Trải nghiệm đọc sách hiện đại và tinh tế!</p>
      </div>

      <!-- Link columns -->
      @for (col of columns; track col.title) {
        <div class="footer-col">
          <h4>{{ col.title }}</h4>
          @for (item of col.links; track item.label) {
            <a [routerLink]="item.link" [fragment]="item.fragment">{{ item.label }}</a>
          }
        </div>
      }

      <!-- Connect -->
      <div class="footer-col">
        <h4>KẾT NỐI</h4>
        <div class="socials">
          <a href="https://www.facebook.com" target="_blank" class="social fb" aria-label="Facebook" style="background: none; padding: 0; overflow: hidden;">
            <img src="assets/img/Facebook_icon.svg.webp" alt="Facebook" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />
          </a>
          <a href="https://zalo.me" target="_blank" class="social zalo" aria-label="Zalo" style="background: none; padding: 0; overflow: hidden;">
            <img src="assets/img/Icon_of_Zalo.svg.webp" alt="Zalo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;" />
          </a>
        </div>
      </div>
    </div>

    <hr class="footer-divider" />

    <div class="footer-bottom">© 2026 Lightbooks Bookstore. All rights reserved.</div>
  </div>
</footer>
