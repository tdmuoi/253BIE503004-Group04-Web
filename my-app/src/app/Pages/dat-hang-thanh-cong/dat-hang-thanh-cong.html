<div class="container">

  <!-- STEPPER -->
  <div class="stepper-wrap">
    <div class="stepper-inner">
      <div class="step-wrap">
        <div class="step-dot done">✓</div>
        <div class="step-label done">Giỏ hàng</div>
      </div>
      <div class="step-line"></div>
      <div class="step-wrap">
        <div class="step-dot done">✓</div>
        <div class="step-label done">Thanh toán</div>
      </div>
      <div class="step-line"></div>
      <div class="step-wrap">
        <div class="step-dot active">⊙</div>
        <div class="step-label active">Hoàn tất</div>
      </div>
    </div>
  </div>

  <!-- LOGO -->
  <div class="logo-block">
    <div class="logo-row">
      <!-- Lightbooks heart book icon logo using custom SVG -->
      <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="#2d3a2e" stroke-width="6"/>
        <path d="M50 30 C40 18, 20 25, 30 45 C35 55, 45 65, 50 72 C55 65, 65 55, 70 45 C80 25, 60 18, 50 30 Z" fill="#2d3a2e"/>
        <path d="M45 42 Q50 38 55 42" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
        <circle cx="43" cy="48" r="3" fill="#ffffff"/>
        <circle cx="57" cy="48" r="3" fill="#ffffff"/>
      </svg>
      <div class="logo-text">
        <span class="logo-name">LIGHTBOOKS</span>
        <span class="logo-tagline">Read light, think bright</span>
      </div>
    </div>
  </div>

  <!-- SUCCESS MESSAGE -->
  <h1 class="success-title">Chúc mừng bạn đã đặt hàng thành công!</h1>
  <p class="success-sub">
    Đơn hàng của bạn đang được xử lý và sẽ sớm được giao<br/>
    đến bạn bởi đội ngũ vận chuyển.
  </p>

  <!-- INFO CARDS -->
  <div class="info-cards">
    <div class="info-card">
      <div class="info-card-label">Mã đơn hàng</div>
      <div class="info-card-value">#1902</div>
    </div>
    <div class="info-card">
      <div class="info-card-label">Dự kiến giao hàng</div>
      <div class="info-card-value">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
        Thứ Năm, 24/10
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="btn-continue" (click)="onContinueShopping()">
      Tiếp tục mua sắm
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>

</div>
